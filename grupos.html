<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study App – Mis Grupos</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-dark: #1a3ec8;
    --blue-mid: #2563eb;
    --blue-light: #60a5fa;
    --teal: #10c98f;
    --teal-dark: #0da876;
    --white: #ffffff;
    --gray-50: #f8faff;
    --gray-100: #eef2ff;
    --gray-400: #94a3b8;
    --gray-600: #475569;
    --shadow-blue: rgba(37, 99, 235, 0.18);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Sora', sans-serif; background: var(--gray-50); min-height: 100vh; }

  /* NAVBAR */
  .nav {
    height: 76px; background: white; border-bottom: 1px solid #e8efff;
    display: flex; align-items: center; padding: 0 28px; gap: 16px;
    box-shadow: 0 2px 12px rgba(37,99,235,0.07); position: sticky; top: 0; z-index: 50;
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo-img { width: 66px; height: 66px; object-fit: cover; border-radius: 14px; }
  .nav-back {
    margin-left: 10px; padding: 8px 18px;
    border: 1.5px solid #e2e8f0; border-radius: 30px;
    background: transparent; color: var(--gray-600);
    font-family: 'Sora', sans-serif; font-size: 0.8rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 7px;
  }
  .nav-back:hover { border-color: var(--blue-mid); color: var(--blue-mid); background: #eff6ff; }
  .nav-title {
    font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 900;
    color: var(--blue-dark); margin-left: 6px;
  }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, var(--blue-mid), var(--teal));
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 800; font-size: 0.9rem; cursor: pointer;
    margin-left: auto; position: relative;
  }
  .avatar-menu {
    display: none; position: absolute; top: 48px; right: 0;
    background: white; border-radius: 14px; min-width: 180px;
    box-shadow: 0 8px 30px rgba(37,99,235,0.15);
    border: 1px solid #e8efff; overflow: hidden; z-index: 100;
  }
  .avatar-menu.open { display: block; }
  .avatar-menu-item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; font-size: 0.83rem; font-weight: 600;
    color: var(--gray-600); cursor: pointer; transition: background 0.15s;
  }
  .avatar-menu-item:hover { background: var(--gray-100); color: var(--blue-mid); }
  .avatar-menu-item.danger { color: #ef4444; }
  .avatar-menu-item.danger:hover { background: #fef2f2; }
  .menu-divider { height: 1px; background: #f1f5f9; margin: 4px 0; }

  /* CONTENIDO */
  .container { max-width: 780px; margin: 0 auto; padding: 32px 20px; }

  .page-header { margin-bottom: 28px; }
  .page-header h1 {
    font-family: 'Nunito', sans-serif; font-size: 1.6rem; font-weight: 900;
    color: #0f1d4a; margin-bottom: 4px;
  }
  .page-header p { font-size: 0.85rem; color: var(--gray-400); }

  /* CARD */
  .card {
    background: white; border-radius: 16px; padding: 20px;
    box-shadow: 0 2px 12px rgba(37,99,235,0.07);
    margin-bottom: 16px; transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: 0 6px 24px rgba(37,99,235,0.13); }

  .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .card-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 1rem; color: white; flex-shrink: 0;
  }
  .card-meta strong { display: block; font-size: 0.9rem; color: #1e293b; }
  .card-meta span { font-size: 0.78rem; color: var(--gray-400); }
  .card-badge { margin-left: auto; padding: 4px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }
  .badge-math    { background: #dbeafe; color: var(--blue-mid); }
  .badge-science { background: #d1fae5; color: #059669; }
  .badge-history { background: #fef3c7; color: #d97706; }
  .badge-lang    { background: #ede9fe; color: #7c3aed; }

  .card-title { font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800; color: #0f1d4a; margin-bottom: 6px; }
  .card-desc { font-size: 0.83rem; color: var(--gray-600); line-height: 1.6; margin-bottom: 12px; }

  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .tag { font-size: 0.72rem; font-weight: 600; padding: 4px 10px; border-radius: 20px; background: var(--gray-100); color: var(--gray-600); }

  .members-row { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
  .mini-avatar {
    width: 26px; height: 26px; border-radius: 50%; border: 2px solid white;
    margin-left: -6px; display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem; font-weight: 800; color: white;
  }
  .mini-avatar:first-child { margin-left: 0; }
  .members-count { font-size: 0.78rem; color: var(--gray-400); margin-left: 6px; }

  .leave-btn {
    padding: 8px 18px; border-radius: 10px;
    border: 1.5px solid #ef4444; background: transparent;
    color: #ef4444; font-family: 'Sora', sans-serif;
    font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .leave-btn:hover { background: #fef2f2; }

  /* EMPTY */
  .empty {
    text-align: center; padding: 60px 20px; color: var(--gray-400);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty p { font-size: 0.9rem; margin-bottom: 16px; }
  .empty-btn {
    padding: 10px 24px;
    background: linear-gradient(135deg, var(--blue-mid), var(--teal-dark));
    color: white; border: none; border-radius: 30px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.9rem;
    cursor: pointer; transition: transform 0.15s;
  }
  .empty-btn:hover { transform: scale(1.04); }

  /* LOADING */
  .loading { text-align: center; padding: 60px; color: var(--gray-400); }
  .load-ring {
    width: 40px; height: 40px; border: 3px solid #e2e8f0;
    border-top-color: var(--teal); border-radius: 50%;
    animation: spin 0.9s linear infinite; margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #0f1d4a; color: white; padding: 10px 22px; border-radius: 30px;
    font-size: 0.85rem; font-weight: 600; transition: transform 0.3s; z-index: 999;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>

<!-- NAVBAR -->
<div class="nav">
  <a class="nav-logo" href="menu.html">
    <img class="nav-logo-img" src="Imagenes/Study app.png" alt="Study App">
  </a>
  <span class="nav-title">Mis Grupos</span>
  <button class="nav-back" onclick="window.location.href='menu.html'">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Volver
  </button>
  <div class="avatar" id="userAvatar" onclick="toggleAvatarMenu()">U
    <div class="avatar-menu" id="avatarMenu">
      <div style="padding:14px 16px 10px;border-bottom:1px solid #f1f5f9">
        <div id="menuNombre" style="font-size:0.88rem;font-weight:700;color:#0f1d4a">Cargando...</div>
        <div id="menuUsername" style="font-size:0.75rem;color:#94a3b8;margin-top:2px"></div>
      </div>
      <div class="avatar-menu-item">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Mi perfil
      </div>
      <div class="menu-divider"></div>
      <div class="avatar-menu-item danger" onclick="logout()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar sesión
      </div>
    </div>
  </div>
</div>

<!-- CONTENIDO -->
<div class="container">
  <div class="page-header">
    <h1>Mis Grupos 📚</h1>
    <p id="subtitulo">Cargando grupos...</p>
  </div>
  <div id="listaGrupos">
    <div class="loading">
      <div class="load-ring"></div>
      <p>Cargando tus grupos...</p>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
                             from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, query, where, onSnapshot, doc, getDoc, updateDoc, arrayRemove }
                             from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app  = initializeApp({
  apiKey:            "AIzaSyAJrBAhTW1D_eJyJkd9Vy_FoZWKvokPU_Q",
  authDomain:        "study-app-caaa3.firebaseapp.com",
  projectId:         "study-app-caaa3",
  storageBucket:     "study-app-caaa3.firebasestorage.app",
  messagingSenderId: "1095017071779",
  appId:             "1:1095017071779:web:905129ca0d49801789ab16"
});
const auth = getAuth(app);
const db   = getFirestore(app);

let currentUser = null;

const colores = ['#2563eb','#10c98f','#f59e0b','#8b5cf6','#ef4444','#059669','#0891b2'];
function colorDeterminista(str) {
  let h = 0; for (const c of (str||'x')) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return colores[h % colores.length];
}
const badgeClass = {
  'Matemáticas':'badge-math','Cálculo':'badge-math','Física':'badge-science',
  'Química':'badge-science','Biología':'badge-science','Historia':'badge-history',
  'Inglés':'badge-lang','Programación':'badge-lang'
};

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;

  const snap = await getDoc(doc(db, 'estudiantes', user.uid));
  if (snap.exists()) {
    const p = snap.data();
    const ini = (p.username || p.nombre || 'U').charAt(0).toUpperCase();
    document.getElementById('userAvatar').childNodes[0].textContent = ini;
    document.getElementById('menuNombre').textContent = p.nombre || '';
    document.getElementById('menuUsername').textContent = p.username ? '@' + p.username : '';
  }

  cargarMisGrupos();
});

function cargarMisGrupos() {
  const q = query(collection(db, 'grupos'), where('miembros', 'array-contains', currentUser.uid));
  onSnapshot(q, (snap) => {
    const lista = document.getElementById('listaGrupos');
    document.getElementById('subtitulo').textContent =
      snap.empty ? 'Aún no te has unido a ningún grupo' : `${snap.size} grupo${snap.size !== 1 ? 's' : ''} unidos`;

    if (snap.empty) {
      lista.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📭</div>
          <p>Aún no te has unido a ningún grupo</p>
          <button class="empty-btn" onclick="window.location.href='menu.html'">Explorar grupos</button>
        </div>`;
      return;
    }

    lista.innerHTML = snap.docs.map(d => {
      const g = d.data();
      const gid = d.id;
      const color = colorDeterminista(g.autorUid || gid);
      const ini = (g.autorUsername || g.autorNombre || '?').charAt(0).toUpperCase();
      const bc = badgeClass[g.materia] || 'badge-lang';
      const miembros = g.miembros?.length || 1;
      const cuposTexto = g.cupos ? `${miembros}/${g.cupos} miembros` : `${miembros} miembro${miembros > 1 ? 's' : ''}`;
      const esMio = g.autorUid === currentUser.uid;

      return `<div class="card">
        <div class="card-header">
          <div class="card-avatar" style="background:linear-gradient(135deg,${color},${color}cc)">${ini}</div>
          <div class="card-meta">
            <strong>@${g.autorUsername || g.autorNombre}</strong>
            <span>${g.autorUniversidad || ''}</span>
          </div>
          ${g.materia ? `<span class="card-badge ${bc}">${g.materia}</span>` : ''}
        </div>
        <div class="card-title">${g.titulo}</div>
        <div class="card-desc">${g.descripcion}</div>
        <div class="card-tags">
          ${g.materia   ? `<span class="tag">${g.materia}</span>`   : ''}
          ${g.modalidad ? `<span class="tag">${g.modalidad}</span>` : ''}
          ${g.cupos     ? `<span class="tag">Máx. ${g.cupos} personas</span>` : ''}
        </div>
        <div class="members-row">
          <div class="mini-avatar" style="background:${color}">${ini}</div>
          <span class="members-count">${cuposTexto}</span>
        </div>
        ${!esMio ? `<button class="leave-btn" onclick="salirGrupo('${gid}')">Salir del grupo</button>`
                 : `<span style="font-size:0.78rem;color:#94a3b8">Tu grupo</span>`}
      </div>`;
    }).join('');
  });
}

window.salirGrupo = async function(gid) {
  if (!confirm('¿Seguro que quieres salir de este grupo?')) return;
  try {
    await updateDoc(doc(db, 'grupos', gid), { miembros: arrayRemove(currentUser.uid) });
    showToast('Saliste del grupo');
  } catch(e) { showToast('Error al salir del grupo'); }
};

window.toggleAvatarMenu = function() {
  document.getElementById('avatarMenu').classList.toggle('open');
};
document.addEventListener('click', (e) => {
  if (!document.getElementById('userAvatar').contains(e.target))
    document.getElementById('avatarMenu').classList.remove('open');
});

window.logout = async function() {
  await signOut(auth);
  window.location.href = 'login.html';
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => t.style.transform = 'translateX(-50%) translateY(80px)', 3000);
}
</script>
</body>
</html>
