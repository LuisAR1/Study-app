<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Red de Conexiones</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060d24; font-family: sans-serif; }
    #network { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<div id="network"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyAJrBAhTW1D_eJyJkd9Vy_FoZWKvokPU_Q",
    authDomain: "study-app-caaa3.firebaseapp.com",
    projectId: "study-app-caaa3"
  });
  const db = getFirestore(app);

  const snap = await getDocs(collection(db, 'estudiantes'));
  const usuarios = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  // Nodos
  const nodes = new vis.DataSet(
    usuarios.map(u => ({
      id: u.id,
      label: u.nombre || u.username || 'Sin nombre',
      title: `${u.carrera || ''}\n${u.universidad || ''}`,
      color: { background: '#2563eb', border: '#60a5fa' },
      font: { color: '#ffffff' },
      shape: 'dot',
      size: 16
    }))
  );

  // Aristas sin duplicados
  const edgeSet = new Set();
  const edgesArr = [];
  for (const u of usuarios) {
    for (const cUid of (u.conexiones || [])) {
      const key = [u.id, cUid].sort().join('|');
      if (!edgeSet.has(key)) {
        edgeSet.add(key);
        edgesArr.push({ from: u.id, to: cUid, color: { color: '#60a5fa' } });
      }
    }
  }
  const edges = new vis.DataSet(edgesArr);

  new vis.Network(
    document.getElementById('network'),
    { nodes, edges },
    {
      physics: { stabilization: false },
      interaction: { hover: true, tooltipDelay: 100 }
    }
  );
</script>
</body>
</html>
